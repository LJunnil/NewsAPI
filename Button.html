<!-- SAUNA ROOM CARDS -->
<div id="sauna-room-cards">
    <div class="sauna-room-card">
        <img src="https://www.sawo.com/wp-content/uploads/2026/02/STANDARD-SAUNA-ROOM.jpg" alt="Standard Sauna Room" />

   <div class="sauna-room-card">
        <img src="https://www.sawo.com/wp-content/uploads/2026/02/GLASS-FRONT-SAUNA-ROOM.jpg" alt="Glass Front Sauna Room" />
        <div class="sauna-room-card-body">
            <h3>Glass Front Sauna Room</h3>
            <p class="card-series">Sauna Room Series</p>
            <div class="sauna-room-card-actions">
                <a href="http://sawo.test:8081/sauna-rooms/" class="btn-explore">Explore</a> 
                <a href="https://www.sawo.com/wp-content/uploads/2026/02/Glass-Front-Assembly-Manual-2026.pdf" target="_blank" class="btn-manual">View Manual</a>
            </div>
        </div>

<script>
(function () {
    function init() {
        var buttons = {
            heater:   document.getElementById('saunaHeaterBtn'),
            controls: document.getElementById('saunaControlsBtn'),
            steam:    document.getElementById('steamGenenatorBtn'),
            room:     document.getElementById('saunaRoomBtn')
        };
        var saunaRoomCards = document.getElementById('sauna-room-cards');
        if (!buttons.room || !saunaRoomCards) return;

        // ── Find elements to hide ──────────────────────────────────────────
        // Strategy: walk UP from #product_category until we find a node
        // whose PARENT is the main page content wrapper, then hide all
        // siblings that come AFTER our node.
        function getSiblingRowsToHide() {
            var ref = document.getElementById('product_category');
            if (!ref) return [];

            // Walk up through parents, collect each ancestor
            var ancestors = [];
            var el = ref.parentElement;
            while (el) {
                ancestors.push(el);
                el = el.parentElement;
            }

            // Try each ancestor: look for one whose next siblings contain
            // the search bar or post grid (fusion-posts-container / fusion-grid)
            for (var i = 0; i < ancestors.length; i++) {
                var candidate = ancestors[i];
                var next = candidate.nextElementSibling;
                while (next) {
                    // Does this sibling (or its descendants) contain the search bar or post grid?
                    if (
                        next.querySelector('input[placeholder*="Search"]') ||
                        next.querySelector('.fusion-posts-container') ||
                        next.querySelector('.fusion-grid') ||
                        next.querySelector('.fusion-blog') ||
                        next.classList.contains('fusion-posts-container') ||
                        next.classList.contains('fusion-grid') ||
                        next.classList.contains('fusion-fullwidth')
                    ) {
                        // Found the right level — collect ALL siblings from candidate onward
                        var siblings = [];
                        var s = candidate.nextElementSibling;
                        while (s) {
                            siblings.push(s);
                            s = s.nextElementSibling;
                        }
                        return siblings;
                    }
                    next = next.nextElementSibling;
                }
            }

            // Fallback: log to console so we can debug
            console.warn('[SAWO] Could not find sibling rows. Dumping ancestor chain:');
            ancestors.slice(0, 8).forEach(function(a, idx) {
                console.log('[SAWO] ancestor[' + idx + ']', a.tagName, a.className.substr(0,80));
                var s = a.nextElementSibling;
                if (s) console.log('   → nextSibling:', s.tagName, s.className.substr(0,80));
            });
            return [];
        }

        var cachedSiblings = null;

        function getHideTargets() {
            if (!cachedSiblings) {
                cachedSiblings = getSiblingRowsToHide();
                console.log('[SAWO] Will hide', cachedSiblings.length, 'sibling rows');
            }
            return cachedSiblings;
        }

        function setActive(activeKey) {
            Object.keys(buttons).forEach(function (k) {
                if (buttons[k]) buttons[k].classList.remove('active');
            });
            if (buttons[activeKey]) buttons[activeKey].classList.add('active');
        }

        function showSaunaRoom() {
            setActive('room');
            saunaRoomCards.style.display = 'flex';
            getHideTargets().forEach(function (el) {
                el.setAttribute('data-sawo-hidden', '1');
                el.style.setProperty('display', 'none', 'important');
            });
        }

        function hideSaunaRoom() {
            saunaRoomCards.style.display = 'none';
            document.querySelectorAll('[data-sawo-hidden="1"]').forEach(function (el) {
                el.removeAttribute('data-sawo-hidden');
                el.style.removeProperty('display');
            });
        }

        buttons.room.addEventListener('click', showSaunaRoom);
        [['heater','heater'],['controls','controls'],['steam','steam']].forEach(function(pair) {
            if (buttons[pair[0]]) {
                buttons[pair[0]].addEventListener('click', function () {
                    setActive(pair[1]);
                    hideSaunaRoom();
                });
            }
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
